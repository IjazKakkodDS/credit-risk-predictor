<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 320" width="100%" role="img" aria-labelledby="svgTitle svgDesc">
  <title id="svgTitle">Scale Benchmark Flow</title>
  <desc id="svgDesc">The requested scale ladder runs 100K, 500K, and 1M row training stages. Each stage records runtime, memory, and metrics, which are combined into the scale benchmark JSON and Markdown reports.</desc>
  <defs>
    <marker id="arrowhead" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L8,4 L0,8 Z" fill="#475569"/>
    </marker>
  </defs>
  <style>
    .bg { fill:#ffffff; }
    .node { fill:#f8fafc; stroke:#2563eb; stroke-width:1.5; }
    .label { font-family: Arial, Helvetica, sans-serif; font-size:13px; fill:#1e293b; text-anchor:middle; }
    .edge { stroke:#475569; stroke-width:2; fill:none; marker-end:url(#arrowhead); }
  </style>
  <rect class="bg" x="0" y="0" width="1080" height="320"/>

  <!-- edges -->
  <line class="edge" x1="260" y1="160" x2="298" y2="70"/>
  <line class="edge" x1="260" y1="160" x2="298" y2="160"/>
  <line class="edge" x1="260" y1="160" x2="298" y2="250"/>
  <line class="edge" x1="520" y1="70" x2="558" y2="150"/>
  <line class="edge" x1="520" y1="160" x2="558" y2="160"/>
  <line class="edge" x1="520" y1="250" x2="558" y2="170"/>
  <line class="edge" x1="780" y1="160" x2="818" y2="160"/>

  <!-- nodes -->
  <rect class="node" x="40" y="130" width="220" height="60" rx="10"/>
  <text class="label" x="150" y="165">Requested scale ladder</text>

  <rect class="node" x="300" y="40" width="220" height="60" rx="10"/>
  <text class="label" x="410" y="75">100K run</text>

  <rect class="node" x="300" y="130" width="220" height="60" rx="10"/>
  <text class="label" x="410" y="165">500K run</text>

  <rect class="node" x="300" y="220" width="220" height="60" rx="10"/>
  <text class="label" x="410" y="255">1M run</text>

  <rect class="node" x="560" y="130" width="220" height="60" rx="10"/>
  <text class="label" x="670" y="154">Runtime, memory,</text>
  <text class="label" x="670" y="170">metrics</text>

  <rect class="node" x="820" y="130" width="220" height="60" rx="10"/>
  <text class="label" x="930" y="154">Scale benchmark JSON</text>
  <text class="label" x="930" y="170">and Markdown</text>
</svg>
