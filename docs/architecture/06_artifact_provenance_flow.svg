<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 410" width="100%" role="img" aria-labelledby="svgTitle svgDesc">
  <title id="svgTitle">Artifact and Provenance Flow</title>
  <desc id="svgDesc">The training command produces the model and preprocessor, metrics and plots, split and segment reports, and the environment and source fingerprint. The model, metrics, and split artifacts are combined into SHA-256 checksums, while the environment and source fingerprint feeds the provenance report alongside the checksums.</desc>
  <defs>
    <marker id="arrowhead" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L8,4 L0,8 Z" fill="#475569"/>
    </marker>
  </defs>
  <style>
    .bg { fill:#ffffff; }
    .node { fill:#f8fafc; stroke:#2563eb; stroke-width:1.5; }
    .label { font-family: Arial, Helvetica, sans-serif; font-size:13px; fill:#1e293b; text-anchor:middle; }
    .edge { stroke:#475569; stroke-width:2; fill:none; marker-end:url(#arrowhead); }
  </style>
  <rect class="bg" x="0" y="0" width="1080" height="410"/>

  <!-- edges: A fans out to B, C, D, E -->
  <line class="edge" x1="260" y1="205" x2="298" y2="70"/>
  <line class="edge" x1="260" y1="205" x2="298" y2="160"/>
  <line class="edge" x1="260" y1="205" x2="298" y2="250"/>
  <line class="edge" x1="260" y1="205" x2="298" y2="340"/>

  <!-- edges: B, C, D converge to F -->
  <line class="edge" x1="520" y1="70" x2="558" y2="145"/>
  <line class="edge" x1="520" y1="160" x2="558" y2="160"/>
  <line class="edge" x1="520" y1="250" x2="558" y2="175"/>

  <!-- edges: F to G, E bypasses F straight to G -->
  <line class="edge" x1="780" y1="165" x2="818" y2="220"/>
  <line class="edge" x1="520" y1="340" x2="818" y2="235"/>

  <!-- nodes -->
  <rect class="node" x="40" y="175" width="220" height="60" rx="10"/>
  <text class="label" x="150" y="210">Training command</text>

  <rect class="node" x="300" y="40" width="220" height="60" rx="10"/>
  <text class="label" x="410" y="64">Model and</text>
  <text class="label" x="410" y="80">preprocessor</text>

  <rect class="node" x="300" y="130" width="220" height="60" rx="10"/>
  <text class="label" x="410" y="154">Metrics and plots</text>

  <rect class="node" x="300" y="220" width="220" height="60" rx="10"/>
  <text class="label" x="410" y="244">Split and segment</text>
  <text class="label" x="410" y="260">reports</text>

  <rect class="node" x="300" y="310" width="220" height="60" rx="10"/>
  <text class="label" x="410" y="334">Environment and</text>
  <text class="label" x="410" y="350">source fingerprint</text>

  <rect class="node" x="560" y="130" width="220" height="60" rx="10"/>
  <text class="label" x="670" y="165">SHA-256 checksums</text>

  <rect class="node" x="820" y="190" width="220" height="60" rx="10"/>
  <text class="label" x="930" y="225">Provenance report</text>
</svg>
